server {
  listen 80;
  listen [::]:80;
  server_name h-town.duckdns.org www.h-town.duckdns.org;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name h-town.duckdns.org www.h-town.duckdns.org;

  ssl_certificate /etc/letsencrypt/live/h-town.duckdns.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/h-town.duckdns.org/privkey.pem;

  root /var/www/h-town-duckdns;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https: blob:; media-src 'self' https://cdn.pixabay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' https://challenges.cloudflare.com; connect-src 'self' https: wss://h-town.duckdns.org:3105 wss://h-town.duckdns.org https://challenges.cloudflare.com https://accounts.google.com; frame-src 'self' https://www.google.com https://maps.google.com https://challenges.cloudflare.com https://accounts.google.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

  gzip on;
  gzip_vary on;
  gzip_min_length 512;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

  # === BIFA WEB PROTOTYPE ===

  # BEGIN HTOWN_COMBAT_PROXY
  location ^~ /combat {
    proxy_pass http://127.0.0.1:3102;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https: blob:; media-src 'self' https://cdn.pixabay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com https://accounts.google.com; connect-src 'self' https: wss://h-town.duckdns.org:3105 wss://h-town.duckdns.org https://challenges.cloudflare.com https://accounts.google.com; frame-src 'self' https://www.google.com https://maps.google.com https://challenges.cloudflare.com https://accounts.google.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
  }
  # END HTOWN_COMBAT_PROXY

  # BEGIN COMBAT_SOCKET
  location ^~ /combat-socket/ {
    proxy_pass http://127.0.0.1:3105/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;
  }
  # END COMBAT_SOCKET














  location = /bifa { return 301 /bifa/; }
  location /bifa/ {
    root /var/www/h-town-duckdns;
    try_files $uri $uri/ /bifa/index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
  }
  location /bifa/assets/ {
    root /var/www/h-town-duckdns;
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
  }
  location ^~ /bifa-socket/ {
    proxy_pass http://127.0.0.1:3340/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;
  }


